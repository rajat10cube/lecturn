services:
  lecturn:
    build: .
    image: lecturn:latest
    container_name: lecturn
    ports:
      - "8800:8000"
    volumes:
      # mount your real course libraries read-only (edit paths to match your host)
      - /mnt/media/udemy-downloads:/libraries/udemy-downloads:ro
      - /mnt/media/courses:/libraries/courses:ro
      # library/grouping config
      - ./lecturn.yaml:/config/lecturn.yaml:ro
      # app state (sqlite + thumbnail/transcode cache)
      - lecturn-data:/data
    environment:
      LECTURN_CONFIG: /config/lecturn.yaml
      LECTURN_DATA_DIR: /data
      LECTURN_AUTH: basic
      LECTURN_AUTH_USER: admin
      LECTURN_AUTH_PASS: change-me
      LECTURN_DEV_CORS: "false"
    restart: unless-stopped

volumes:
  lecturn-data:
